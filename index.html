<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tuinafsluiter Prikklok</title>
<meta name="theme-color" content="#003b2e"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Tuinafsluiter"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<style>
:root{--g0:#002a22;--g1:#003b2e;--g2:#0e6b52;--g3:#29b56b;--lime:#7fb344;--white:#fff;--muted:#b9c9c3;--line:rgba(255,255,255,.16);--glass:rgba(255,255,255,.075);--shadow:0 28px 70px rgba(0,42,34,.30)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f4f7f5;color:white}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}.hidden{display:none!important}
.app{min-height:100dvh;background:radial-gradient(circle at 85% 0%,#095d49 0,#003b2e 35%,#001f1a 100%);position:relative;overflow:hidden}.app:before{content:"";position:absolute;inset:-20% auto auto -15%;width:56vw;height:56vw;opacity:.33;background:linear-gradient(135deg,transparent 0 35%,#26b96b 35% 48%,transparent 48% 100%);transform:rotate(-8deg);border-radius:60px}.app:after{content:"";position:absolute;right:-12%;bottom:-16%;width:48vw;height:48vw;opacity:.18;background:linear-gradient(135deg,transparent 0 38%,#2db56b 38% 55%,transparent 55%);transform:rotate(8deg);border-radius:70px}.shell{position:relative;z-index:1;min-height:100dvh;display:grid;grid-template-rows:auto 1fr auto}
header{display:flex;justify-content:space-between;align-items:center;padding:28px 48px 10px}.brand{display:flex;align-items:center;gap:18px}.brand img{height:118px;max-width:660px}.clock{text-align:right}.time{font-size:42px;font-weight:900;letter-spacing:-1.5px}.date{color:#d8eee4}.online{display:flex;justify-content:flex-end;gap:8px;color:#7ee0a5;font-weight:800;margin-top:4px}.dot{width:10px;height:10px;border-radius:50%;background:#28d17a;box-shadow:0 0 0 6px rgba(40,209,122,.12)}
main{display:grid;grid-template-columns:34% 1fr;gap:42px;align-items:center;padding:0 48px 26px;min-height:0}.hero{position:relative;min-height:calc(100dvh - 260px);max-height:680px;border-radius:30px;overflow:hidden;background:#01281f;box-shadow:var(--shadow);border:1px solid var(--line)}.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;filter:saturate(1.1) contrast(1.08) brightness(1.08)}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,42,34,.02),rgba(0,42,34,.32)),linear-gradient(180deg,transparent 58%,rgba(0,20,16,.62))}.heroMark{position:absolute;left:-50px;top:-35px;width:85%;height:85%;opacity:.10;background:linear-gradient(135deg,transparent 0 40%,#2db56b 40% 52%,transparent 52%);z-index:2}.dogline{position:absolute;left:26px;right:26px;bottom:24px;z-index:3;display:flex;align-items:center;gap:12px;font-weight:900;font-size:22px;text-shadow:0 3px 12px rgba(0,0,0,.45)}.dogIcon{width:38px;height:28px;border:2px solid #2dd873;border-top:0;border-radius:18px 18px 6px 6px;position:relative}.dogIcon:before{content:"";position:absolute;right:-8px;top:-14px;width:18px;height:18px;border:2px solid #2dd873;border-radius:50%}.dogIcon:after{content:"";position:absolute;left:8px;bottom:-8px;width:6px;height:12px;background:#2dd873;border-radius:4px;box-shadow:18px 0 0 #2dd873}
.panel{max-width:680px;margin:auto;width:100%}.loginLogo{text-align:center;margin-bottom:30px}.loginLogo img{height:130px;max-width:520px}.slogan{margin-top:-16px;color:#39d483;font-size:24px;font-weight:700}.title{font-size:42px;margin:0 0 8px;font-weight:900}.subtitle{color:#d5e8e0;margin:0 0 24px;font-size:18px}.glass{background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(18px);border-radius:28px;padding:28px}.pinText{text-align:center;font-size:20px;font-weight:800;margin-bottom:18px}.dots{display:flex;justify-content:center;gap:14px;margin-bottom:24px}.dots span{width:62px;height:62px;display:grid;place-items:center;border:2px solid #1eb96b;border-radius:14px;background:rgba(0,0,0,.12);font-size:30px;font-weight:900;color:#75eaa7}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:430px;margin:0 auto}.keypad button,.bigbtn{height:64px;border-radius:16px;color:white;background:linear-gradient(145deg,#20bd6f,#0b6b53);font-weight:900;font-size:24px;box-shadow:0 15px 28px rgba(0,0,0,.18)}.keypad .wide{grid-column:span 2}.keypad .del{background:rgba(255,255,255,.12);border:1px solid var(--line)}.bigbtn{width:100%;margin-top:22px;font-size:22px;height:74px}.msg{margin-top:18px;background:rgba(255,255,255,.12);border-left:5px solid #2dd873;border-radius:18px;padding:14px 18px;font-weight:800;color:#fff}
.workHead{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:24px}.role{display:inline-flex;margin-top:8px;background:#2db56b;color:white;border-radius:999px;padding:6px 13px;font-weight:900}.logout{background:transparent;color:white;border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-weight:800}.actions{display:grid;gap:16px}.action{display:flex;gap:18px;align-items:center;text-align:left;background:rgba(255,255,255,.075);border:1px solid var(--line);border-radius:24px;padding:18px 20px;color:white;box-shadow:0 18px 45px rgba(0,0,0,.14)}.action .ico{width:66px;height:66px;display:grid;place-items:center;border-radius:50%;font-size:32px;background:linear-gradient(145deg,#2dd873,#0c765a);font-weight:900;flex:none}.action.red .ico{background:linear-gradient(145deg,#ff5252,#c81f1f)}.action h3{margin:0 0 4px;font-size:24px}.action p{margin:0;color:#c9ded6}.statusGrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}.mini{background:rgba(255,255,255,.075);border:1px solid var(--line);border-radius:20px;padding:16px}.mini span{color:#c9ded6;display:block;font-size:14px}.mini b{font-size:26px}.adminCards{display:grid;gap:18px}.overview{border:1px solid var(--line);border-radius:24px;overflow:hidden}.overview h3{margin:0;padding:16px 18px;border-bottom:1px solid var(--line)}.emp{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--line)}.emp:last-child{border-bottom:0}.avatar{width:44px;height:44px;border-radius:50%;background:#e8f3ed;color:#003b2e;display:grid;place-items:center;font-weight:900}.emp small{display:block;color:#c9ded6}.emp b{font-size:20px}.emp .plus{color:#48e88e}.emp .minus{color:#ff7777}.adminBtns{display:grid;grid-template-columns:1fr 1fr;gap:14px}.tile{min-height:112px;background:rgba(255,255,255,.075);border:1px solid var(--line);border-radius:20px;color:#fff;font-weight:900;font-size:18px}.footer{display:none}
.modal{position:fixed;inset:0;background:rgba(0,20,16,.82);z-index:99;display:none;align-items:center;justify-content:center;padding:24px}.modal.show{display:flex}.modalBox{width:min(1100px,100%);max-height:88dvh;overflow:auto;background:#f6faf8;color:#092820;border-radius:28px;padding:24px;box-shadow:var(--shadow)}.modalHead{display:flex;justify-content:space-between;gap:20px;align-items:center}.btn{border-radius:14px;background:#003b2e;color:white;padding:12px 16px;font-weight:900}.btn.light{background:#e5f2ec;color:#003b2e}.btn.green{background:#2db56b}.form{display:grid;gap:12px}.form input,.form select,.form textarea{padding:12px;border:1px solid #d9e6df;border-radius:12px;background:white}.table{width:100%;border-collapse:collapse;margin-top:14px}.table th,.table td{padding:10px;border-bottom:1px solid #dce7e0;text-align:left}.table th{background:#003b2e;color:white}.two{display:grid;grid-template-columns:1.2fr .8fr;gap:22px}.warn{background:#fff8dd;border:1px solid #f1d275;color:#5a4100;border-radius:14px;padding:12px;margin:12px 0}
@media(max-width:980px){header{padding:18px 18px}.brand img{height:76px;max-width:420px}.clock{display:none}main{grid-template-columns:1fr;padding:0 18px 18px}.hero{min-height:260px;max-height:none}.loginLogo img{height:100px}.slogan{font-size:19px}.title{font-size:34px}.two{grid-template-columns:1fr}.statusGrid{grid-template-columns:1fr 1fr}.adminBtns{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.hero{min-height:210px}.brand img{height:62px;max-width:310px}.loginLogo img{height:82px}.glass{padding:20px}.dots span{width:50px;height:50px}.keypad button{height:58px}.statusGrid,.adminBtns{grid-template-columns:1fr}.emp{grid-template-columns:42px 1fr}.emp>div:last-child{grid-column:2}.action .ico{width:56px;height:56px}.action h3{font-size:20px}}
</style>
</head>
<body><div class="app"><div class="shell">
<header><div class="brand"><img src="assets/logo.svg" alt="Tuinafsluiter"></div><div class="clock"><div class="time" id="time">--:--</div><div class="date" id="date">--</div><div class="online"><span class="dot"></span><span id="mode">Online</span></div></div></header>
<main><section class="hero"><div class="heroMark"></div><img src="assets/charlie.png" alt="Charlie"><div class="dogline"><span class="dogIcon"></span><span>Charlie waakt over uw uren</span></div></section>
<section class="panel">
 <div id="loginView"><div class="loginLogo"><img src="assets/logo.svg" alt="Tuinafsluiter"><div class="slogan">Tuinafsluitingen zonder gedoe.</div></div><div class="glass"><div class="pinText">Voer uw pincode in</div><div class="dots" id="dots"><span>–</span><span>–</span><span>–</span><span>–</span></div><div class="keypad" id="keypad"></div><button class="bigbtn" id="loginBtn">Aanmelden</button></div></div>
 <div id="workView" class="hidden"><div class="workHead"><div><p class="subtitle">Welkom</p><h1 class="title" id="hello">Jos</h1><span class="role hidden" id="roleBadge">Beheerder</span></div><button class="logout" id="logoutBtn">↪ Uitloggen</button></div><div id="employeePanel"><div class="actions"><button class="action" data-action="in"><span class="ico">↪</span><span><h3>Inchecken</h3><p>Start uw werkdag</p></span></button><button class="action" data-action="breakStart"><span class="ico">☕</span><span><h3>Schoft starten</h3><p>Begin uw pauze</p></span></button><button class="action" data-action="breakStop"><span class="ico">▶</span><span><h3>Schoft stoppen</h3><p>Einde van uw pauze</p></span></button><button class="action red" data-action="out"><span class="ico">↩</span><span><h3>Uitchecken</h3><p>Einde werkdag</p></span></button></div><div class="statusGrid" id="statusGrid"></div></div><div id="adminPanel" class="adminCards hidden"><div class="overview"><h3>Vandaag - Overzicht</h3><div id="adminToday"></div></div><div class="adminBtns"><button class="tile" id="plusBtn">📊 Plusuren</button><button class="tile" id="recupBtn">📅 Recupdagen</button><button class="tile" id="verlofBtn">🌴 Verlof</button><button class="tile" id="ziekteBtn">♡ Ziekte</button></div></div></div>
 <div id="message" class="msg hidden"></div>
</section></main><footer></footer></div></div>
<div class="modal" id="adminModal"><div class="modalBox"><div class="modalHead"><h2 id="modalTitle">Beheer</h2><button class="btn light" id="closeModal">Sluiten</button></div><div id="modalContent"></div></div></div>
<script>
const SUPABASE_URL='https://uwtkopnjwewkodozvkxi.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_-YUPSJu3IeIID2mS1rhgIA_nngfTjWA';
const API=SUPABASE_URL+'/rest/v1';
const HEADERS={apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json'};
const NORM=480;let pin='',current=null,users=[],records=[],activeEntry=null;
const $=id=>document.getElementById(id);
function tick(){let d=new Date();$('time').textContent=d.toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'});$('date').textContent=d.toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}setInterval(tick,1000);tick();
function today(){return new Date().toISOString().slice(0,10)}function iso(){return new Date().toISOString()}function mins(a,b){return Math.round((new Date(b)-new Date(a))/60000)}
function dur(m){m=Math.round(Number(m)||0);let neg=m<0;m=Math.abs(m);return (neg?'-':'')+Math.floor(m/60)+'u'+String(m%60).padStart(2,'0')}function sal(m){m=Math.round(Number(m)||0);return (m>=0?'+':'-')+dur(Math.abs(m))}function hm(x){return x?new Date(x).toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'}):'--:--'}
async function sb(path,opts={}){let res=await fetch(API+path,{...opts,headers:{...HEADERS,...(opts.headers||{})}});if(!res.ok)throw new Error(await res.text());if(res.status===204)return null;return res.json()}
function msg(t){$('message').textContent=t;$('message').classList.remove('hidden');setTimeout(()=>$('message').classList.add('hidden'),5200)}function err(e){return String(e.message||e).slice(0,220)}
function drawDots(){[...$('dots').children].forEach((s,i)=>s.textContent=pin[i]?'•':'–')}function keypad(){['1','2','3','4','5','6','7','8','9','0','⌫'].forEach(n=>{let b=document.createElement('button');b.textContent=n;if(n==='0')b.className='wide';if(n==='⌫')b.className='del';b.onclick=()=>{if(n==='⌫')pin=pin.slice(0,-1);else if(pin.length<4)pin+=n;drawDots();if(pin.length===4)setTimeout(login,120)};$('keypad').appendChild(b)})}keypad();$('loginBtn').onclick=login;
async function load(){users=await sb('/werknemers?select=*&actief=eq.true&order=id.asc');records=await sb('/urenregistratie?select=*&order=datum.desc,inkloktijd.desc&limit=300');if(current)activeEntry=await getActive(current.id);render()}
async function getActive(uid){let r=await sb(`/urenregistratie?select=*&medewerker_id=eq.${uid}&datum=eq.${today()}&uitkloktijd=is.null&inkloktijd=not.is.null&order=inkloktijd.desc&limit=1`);return r[0]||null}
async function login(){try{let r=await sb('/werknemers?select=*&pincode=eq.'+encodeURIComponent(pin)+'&actief=eq.true&limit=1');if(!r[0]){msg('🐕 Charlie kent deze pincode niet.');pin='';drawDots();return}current=r[0];pin='';drawDots();$('loginView').classList.add('hidden');$('workView').classList.remove('hidden');$('hello').textContent=current.naam;let admin=isAdmin();$('roleBadge').classList.toggle('hidden',!admin);$('employeePanel').classList.toggle('hidden',admin);$('adminPanel').classList.toggle('hidden',!admin);await load();msg('Welkom '+current.naam+'.')}catch(e){msg('Loginfout: '+err(e))}}
function isAdmin(){let r=String(current?.rol||'').toLowerCase();return r.includes('admin')||r.includes('beheer')||current?.naam?.toLowerCase()==='jos'}
function calc(r){let w=Number(r.totaal_minuten||0);if(!w&&r.inkloktijd&&r.uitkloktijd)w=Math.max(0,mins(r.inkloktijd,r.uitkloktijd)-Number(r.pauze_minuten||0));let type='Werkdag';if(!r.inkloktijd&&w<0)type=w<=-480?'Recupdag':'Halve recup';if(!r.inkloktijd&&w===480)type='Verlof';if(!r.inkloktijd&&w===0&&r.uitkloktijd)type='Ziekte';return{worked:w,pause:Number(r.pauze_minuten||0),balance:w? w-NORM:0,type}}
function userRecs(uid){return records.filter(r=>Number(r.medewerker_id)===Number(uid))}function monthSaldo(uid){return userRecs(uid).filter(r=>String(r.datum||'').startsWith(today().slice(0,7))&&(r.uitkloktijd||r.totaal_minuten!==null)).reduce((s,r)=>s+calc(r).balance,0)}function dayWork(uid){let rs=userRecs(uid).filter(r=>r.datum===today());return rs.reduce((s,r)=>s+calc(r).worked,0)}
function render(){if(!current)return;if(isAdmin())renderAdminHome();else renderEmployee()}
function renderEmployee(){let r=activeEntry||userRecs(current.id).find(x=>x.datum===today());let ps=r?localStorage.getItem('pause_'+r.id):null;let c=r?calc(r):null;$('statusGrid').innerHTML=r?`<div class="mini"><span>Ingecheckt</span><b>${hm(r.inkloktijd)}</b></div><div class="mini"><span>Schoft</span><b>${dur(c.pause)}${ps?' loopt':''}</b></div><div class="mini"><span>Uitchecken</span><b>${hm(r.uitkloktijd)}</b></div><div class="mini"><span>Vandaag</span><b>${dur(c.worked)}</b></div>`:`<div class="mini"><span>Status</span><b>Nog niet gestart</b></div><div class="mini"><span>Vandaag</span><b>0u00</b></div>`}
function renderAdminHome(){let list=users.filter(u=>!String(u.rol||'').toLowerCase().includes('admin')&&u.naam.toLowerCase()!=='jos');$('adminToday').innerHTML=list.map(u=>{let open=userRecs(u.id).find(r=>r.datum===today()&&!r.uitkloktijd&&r.inkloktijd);let status=open?'Aan het werk':'Vandaag';let w=dayWork(u.id);let s=monthSaldo(u.id);return `<div class="emp"><div class="avatar">${u.naam[0]}</div><div><b>${u.naam}</b><small>${status} gewerkt</small><small>Saldo maand</small></div><div><b>${dur(w)}</b><small class="${s>=0?'plus':'minus'}">${sal(s)}</small></div></div>`}).join('')||'<div class="emp">Geen werknemers gevonden</div>'}
async function action(a){try{let r=await getActive(current.id);if(a==='in'){if(r)return msg('Je bent al ingecheckt.');await sb('/urenregistratie',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify({medewerker_id:current.id,datum:today(),inkloktijd:iso(),pauze_minuten:0})});msg('🐕 Ingecheckt. Goede werkdag!')}
if(a==='breakStart'){if(!r)return msg('Eerst inchecken.');localStorage.setItem('pause_'+r.id,iso());msg('☕ Schoft gestart.')}
if(a==='breakStop'){if(!r)return msg('Geen actieve werkdag.');let ps=localStorage.getItem('pause_'+r.id);if(!ps)return msg('Geen actieve schoft gevonden.');let add=Math.max(0,mins(ps,iso()));await sb('/urenregistratie?id=eq.'+r.id,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify({pauze_minuten:Number(r.pauze_minuten||0)+add})});localStorage.removeItem('pause_'+r.id);msg('☕ Schoft gestopt: '+dur(add))}
if(a==='out'){if(!r)return msg('Je bent nog niet ingecheckt.');let ps=localStorage.getItem('pause_'+r.id),pause=Number(r.pauze_minuten||0);if(ps){pause+=Math.max(0,mins(ps,iso()));localStorage.removeItem('pause_'+r.id)}let out=iso(),worked=Math.max(0,mins(r.inkloktijd,out)-pause);await sb('/urenregistratie?id=eq.'+r.id,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify({uitkloktijd:out,pauze_minuten:pause,totaal_minuten:worked})});msg('🐕 Uitgecheckt. Netto: '+dur(worked))}await load()}catch(e){msg('Databasefout: '+err(e))}}
document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>action(b.dataset.action));$('logoutBtn').onclick=()=>{current=null;activeEntry=null;$('workView').classList.add('hidden');$('loginView').classList.remove('hidden');msg('Uitgelogd.')};
function openModal(title,html){$('modalTitle').textContent=title;$('modalContent').innerHTML=html;$('adminModal').classList.add('show')} $('closeModal').onclick=()=>$('adminModal').classList.remove('show');
$('plusBtn').onclick=()=>{let rows=users.filter(u=>!isNaN(u.id)).map(u=>`<tr><td>${u.naam}</td><td>${dur(dayWork(u.id))}</td><td>${sal(monthSaldo(u.id))}</td></tr>`).join('');openModal('Plusuren',`<table class="table"><tr><th>Werknemer</th><th>Vandaag</th><th>Saldo deze maand</th></tr>${rows}</table><p class="warn">Regel: 8u00 per werkdag is nul. Meer is plus, minder is min.</p>`)};
function specialForm(type){let options=users.filter(u=>!isAdminUser(u)).map(u=>`<option value="${u.id}">${u.naam}</option>`).join('');let map={recup:'Recupdag',verlof:'Verlof',ziekte:'Ziekte'};openModal(map[type],`<div class="two"><div><div class="form"><select id="mUser">${options}</select><input id="mDate" type="date" value="${today()}">${type==='recup'?'<select id="mAmount"><option value="-480">Volledige recupdag (-8u)</option><option value="-240">Halve recup (-4u)</option></select>':''}<button class="btn green" id="mSave">Opslaan</button></div><p class="warn">Dit wordt opgeslagen in Supabase als aparte dagregel.</p></div><div><h3>Vandaag</h3><div id="mInfo"></div></div></div>`);$('mSave').onclick=()=>saveSpecial(type)}
function isAdminUser(u){let r=String(u.rol||'').toLowerCase();return r.includes('admin')||r.includes('beheer')||u.naam.toLowerCase()==='jos'}
$('recupBtn').onclick=()=>specialForm('recup');$('verlofBtn').onclick=()=>specialForm('verlof');$('ziekteBtn').onclick=()=>specialForm('ziekte');
async function saveSpecial(type){try{let uid=Number($('mUser').value),date=$('mDate').value;let val=0;if(type==='recup')val=Number($('mAmount').value);if(type==='verlof')val=480;if(type==='ziekte')val=0;await sb('/urenregistratie',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify({medewerker_id:uid,datum:date,pauze_minuten:0,totaal_minuten:val,uitkloktijd:iso()})});msg(type+' opgeslagen.');$('adminModal').classList.remove('show');await load()}catch(e){msg('Opslagfout: '+err(e))}}
load().catch(e=>msg('Supabase fout: '+err(e)));
</script></body></html>
