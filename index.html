/* v2.9 duidelijke actiebanners */
.actionBanner{
  position:fixed;left:50%;top:max(18px,env(safe-area-inset-top));transform:translateX(-50%);
  width:min(560px,calc(100vw - 28px));z-index:9999;
  border-radius:22px;padding:18px 20px;
  box-shadow:0 22px 60px rgba(0,0,0,.38);
  border:1px solid rgba(255,255,255,.22);
  color:#fff;animation:bannerIn .22s ease-out;
}
.actionBanner.ok{background:linear-gradient(135deg,#0d7b55,#22b66a)}
.actionBanner.warn{background:linear-gradient(135deg,#9a6a00,#e7a900)}

.actionBanner h2{margin:0;font-size:28px;letter-spacing:.2px}

.actionBanner small{display:block;margin-top:6px;color:rgba(255,255,255,.85);font-weight:750}
@keyframes bannerIn{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}

function vacationStats(uid,year=new Date().getFullYear()){
  let rows=userRecs(uid).filter(r=>String(r.datum||'').startsWith(String(year)));
  let ent=holidayEntitlement(uid);
  let approvedV=rows.filter(r=>calc(r).type==='Verlof').length;
  let approvedA=rows.filter(r=>calc(r).type==='ADV').length;
  let pendingV=rows.filter(r=>Number(r.pauze_minuten)===PENDING_LEAVE&&leaveKindFromRecord(r)==='Verlof').length;
  let pendingA=rows.filter(r=>Number(r.pauze_minuten)===PENDING_LEAVE&&leaveKindFromRecord(r)==='ADV').length;
  let denied=rows.filter(r=>Number(r.pauze_minuten)===DENIED_LEAVE).length;
  return{
    year,
    total:ent.verlof,approved:approvedV,pending:pendingV,denied,remaining:Math.max(0,ent.verlof-approvedV-pendingV),
    advTotal:ent.adv,advApproved:approvedA,advPending:pendingA,advRemaining:Math.max(0,ent.adv-approvedA-pendingA)
  };
}

function pendingGroups(){

 rows.forEach(r=>{

async function saveStartSaldo(uid){

  let m=Math.max(0,Math.min(59,Number($('startSaldoMinutes').value||0)));

function timeVal(x){return x?new Date(x).toTimeString().slice(0,5):''}
function localIso(date,time){if(!date||!time)return null;return new Date(date+'T'+time+':00').toISOString()}
function editRegistration(id){

async function saveRegistration(id){
 try{
  let date=$('eDate').value, tin=$('eIn').value, tout=$('eOut').value, pause=Number($('ePause').value||0), manual=$('eTotal').value;
  let inIso=localIso(date,tin), outIso=localIso(date,tout), total=null;
  if(inIso&&outIso) total=Math.max(0,mins(inIso,outIso)-pause); else if(manual!=='') total=Number(manual);
  let body={medewerker_id:Number($('eUser').value),datum:date,inkloktijd:inIso,uitkloktijd:outIso,pauze_minuten:pause,totaal_minuten:total};
  await sb('/urenregistratie?id=eq.'+id,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify(body)});
  actionBanner('💾 REGISTRATIE OPGESLAGEN','Uren zijn opnieuw berekend','ok','Charlie heeft opnieuw gerekend.');msg('Registratie opgeslagen. Charlie heeft opnieuw gerekend.'); await safeAudit('Registratie aangepast door '+(current?.naam||'onbekend'),{actie:'registratie_aangepast',id}); await load(); registrationsModal();
 }catch(e){msg('Opslagfout: '+err(e))}
}

function datesBetween(start,end,skipWeekend){let out=[],a=new Date(start+'T12:00:00'),b=new Date(end+'T12:00:00');if(isNaN(a)||isNaN(b)||a>b)return out;for(let d=new Date(a);d<=b;d.setDate(d.getDate()+1)){let day=d.getDay();if(skipWeekend&&(day===0||day===6))continue;out.push(d.toISOString().slice(0,10))}return out}
async function saveSpecial(type){
 try{
  let uid=Number($('mUser').value);let rows=[];
  if(type==='recup'){
   let date=$('mDate').value,val=Number($('mAmount').value);
   rows=[{medewerker_id:uid,datum:date,pauze_minuten:0,totaal_minuten:val,uitkloktijd:iso()}]
  }else{
   let ds=datesBetween($('mStart').value,$('mEnd').value,$('mSkipWeekend').checked);
   if(!ds.length)return msg('Geen geldige dagen gekozen.');
   let kind=type==='verlof'?($('mKind')?.value||'verlof'):type;
   let val=kind==='adv'?481:(type==='verlof'?480:0);
   rows=ds.map(date=>({medewerker_id:uid,datum:date,pauze_minuten:0,totaal_minuten:val,uitkloktijd:iso()}))
  }
  await sb('/urenregistratie',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify(rows)});
  let label=type==='verlof'&&$('mKind')?.value==='adv'?'ADV':(type==='recup'?'Recup':type);
  actionBanner('✅ OPGESLAGEN',label+' '+rows.length+' dag(en)','ok','Charlie heeft dit verwerkt.');
  msg(label+' opgeslagen: '+rows.length+' dag(en).');

  closeModal();await load()
 }catch(e){msg('Opslagfout: '+err(e))}
}

function exportRows(uid='all',from='1900-01-01',to='2999-12-31'){
 let userById=Object.fromEntries(users.map(u=>[Number(u.id),u.naam]));
 return records.filter(r=>(uid==='all'||Number(r.medewerker_id)===Number(uid))&&String(r.datum||'')>=from&&String(r.datum||'')<=to)
  .sort((a,b)=>String(a.datum||'').localeCompare(String(b.datum||'')) || String(a.inkloktijd||'').localeCompare(String(b.inkloktijd||'')))
  .map(r=>{let c=calc(r);return{
    datum:r.datum||'',
    werknemer:userById[Number(r.medewerker_id)]||r.medewerker_id,
    type:c.type,
    in:hm(r.inkloktijd),
    uit:hm(r.uitkloktijd),
    schoft:dur(c.pause),
    gewerkt:dur(c.worked),
    saldo:sal(c.balance),
    worked:c.worked,
    balance:c.balance
  }});
}

function summaryByEmployee(rows){
 let map={};
 rows.forEach(r=>{if(!map[r.werknemer])map[r.werknemer]={werknemer:r.werknemer,worked:0,balance:0,days:0};map[r.werknemer].worked+=r.worked;map[r.werknemer].balance+=r.balance;if(r.worked>0)map[r.werknemer].days+=1});
 return Object.values(map).sort((a,b)=>a.werknemer.localeCompare(b.werknemer));
}
function exportHtml(rows,type){
 if(type==='summary'){
  let sum=summaryByEmployee(rows);
  return `<table class="table"><tr><th>Werknemer</th><th>Werkdagen</th><th>Gewerkt periode</th><th>Saldo periode</th><th>Totaal saldo app</th></tr>${sum.map(s=>{let u=users.find(x=>x.naam===s.werknemer);let t=u?totalSaldo(u.id):0;return `<tr><td>${s.werknemer}</td><td>${s.days}</td><td>${dur(s.worked)}</td><td>${sal(s.balance)}</td><td>${sal(t)}</td></tr>`}).join('')}</table>`;
 }
 return `<table class="table"><tr><th>Datum</th><th>Werknemer</th><th>Type</th><th>In</th><th>Uit</th><th>Schoft</th><th>Gewerkt</th><th>Saldo</th></tr>${rows.map(r=>`<tr><td>${r.datum}</td><td>${r.werknemer}</td><td>${r.type}</td><td>${r.in}</td><td>${r.uit}</td><td>${r.schoft}</td><td>${r.gewerkt}</td><td>${r.saldo}</td></tr>`).join('')}</table>`;
}
function renderExportPreview(){

 $('exportPreview').innerHTML=`<div class="exportSummary"><div class="mini"><span>Periode</span><b>${s.from} → ${s.to}</b></div><div class="mini"><span>Regels</span><b>${rows.length}</b></div><div class="mini"><span>Gewerkt</span><b>${dur(worked)}</b></div><div class="mini"><span>Saldo</span><b>${sal(balance)}</b></div></div>${exportHtml(rows,s.type)}`;
}

function copyCsvReport(){
 let s=exportSelection(), rows=exportRows(s.uid,s.from,s.to);
 let lines=[['Datum','Werknemer','Type','In','Uit','Schoft','Gewerkt','Saldo'].map(csvEscape).join(';')];
 rows.forEach(r=>lines.push([r.datum,r.werknemer,r.type,r.in,r.uit,r.schoft,r.gewerkt,r.saldo].map(csvEscape).join(';')));
 lines.push('');
 lines.push(['TOTAAL PER WERKNEMER','','','','','','',''].map(csvEscape).join(';'));
 summaryByEmployee(rows).forEach(s=>{let u=users.find(x=>x.naam===s.werknemer);let t=u?totalSaldo(u.id):0;lines.push(['',s.werknemer,'Samenvatting','','','',dur(s.worked),'Periode '+sal(s.balance)+' / Totaal '+sal(t)].map(csvEscape).join(';'))});
 navigator.clipboard?.writeText(lines.join('\n')).then(()=>msg('CSV gekopieerd. Plak dit in Excel/Numbers.')).catch(()=>msg('Kopiëren niet gelukt.'));
}

</style></head><body>
 <div class="reportHeader"><div><h1>Tuinafsluiter Hub</h1><div class="small">Urenrapport</div></div><div class="small">Aangemaakt: ${new Date().toLocaleString('nl-BE')}<br>Periode: ${s.from} t.e.m. ${s.to}</div></div>
 <div class="summary"><div class="box">Regels<b>${rows.length}</b></div><div class="box">Gewerkt<b>${dur(worked)}</b></div><div class="box">Saldo<b>${sal(balance)}</b></div><div class="box">Rapport<b>${s.type==='summary'?'Samenvatting':'Details'}</b></div></div>
 ${exportHtml(rows,s.type)}
 </body></html>`;
}
function printPdfReport(){
 let s=exportSelection(), rows=exportRows(s.uid,s.from,s.to);
 let w=window.open('','_blank');
 if(!w)return msg('Popup geblokkeerd. Sta popups toe voor PDF.');
 w.document.open();w.document.write(reportDocumentHtml(rows,s));w.document.close();
 setTimeout(()=>w.print(),450);
}
function csvEscape(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}
function downloadCsvReport(){
 let s=exportSelection(), rows=exportRows(s.uid,s.from,s.to);
 if(!rows.length){msg('Geen regels gevonden voor deze export.');return;}
 let lines=[['Datum','Werknemer','Type','In','Uit','Schoft','Gewerkt','Saldo'].map(csvEscape).join(';')];
 rows.forEach(r=>lines.push([r.datum,r.werknemer,r.type,r.in,r.uit,r.schoft,r.gewerkt,r.saldo].map(csvEscape).join(';')));
 lines.push('');
 lines.push(['TOTAAL PER WERKNEMER','','','','','','',''].map(csvEscape).join(';'));
 summaryByEmployee(rows).forEach(s=>{let u=users.find(x=>x.naam===s.werknemer);let t=u?totalSaldo(u.id):0;lines.push(['',s.werknemer,'Samenvatting','','','',dur(s.worked),'Periode '+sal(s.balance)+' / Totaal '+sal(t)].map(csvEscape).join(';'))});
 let csv="\ufeff"+lines.join('\n');
 let filename=`tuinafsluiter-uren-${s.from}-tot-${s.to}.csv`;
 let blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
 let url=URL.createObjectURL(blob);
 let holder=$('exportDownloadLink');
 if(holder){
   holder.innerHTML=`<a class="btn green" id="realCsvLink" download="${filename}">Download Excel/CSV bestand</a><p class="warn">Klik op de groene downloadknop. Op iPhone komt dit bij Downloads.</p>`;
   $('realCsvLink').href=url;
 }
 let a=document.createElement('a');
 a.href=url;a.download=filename;
 document.body.appendChild(a);
 try{a.click();msg('Excel/CSV export gestart. Kijk bij Downloads.');}catch(e){msg('Klik op de groene downloadknop in het venster.');}
 setTimeout(()=>{a.remove();},1000);
 setTimeout(()=>{URL.revokeObjectURL(url);},120000);
}

function liveSqlText(){
 return [
'-- Tuinafsluiter Hub live start reset',
'-- 1) Wis chat, mededelingen en activiteitenlog',
'delete from hub_items;',
'',
'-- 2) Wis ALLE testregistraties',
'-- Gebruik dit alleen vlak voor de echte start als alles testdata is.',
'delete from urenregistratie;',
'',
"-- Werknemers, pincodes en beginsaldo's blijven behouden."
 ].join('\n');
}

function monthKey(d){return String(d||'').slice(0,7)}
function currentMonth(){return today().slice(0,7)}
function monthSaldoFor(uid,month=currentMonth()){
  return userRecs(uid).filter(r=>monthKey(r.datum)===month).reduce((a,r)=>a+calc(r).balance,0);
}
function monthWorkedFor(uid,month=currentMonth()){
  return userRecs(uid).filter(r=>monthKey(r.datum)===month).reduce((a,r)=>a+calc(r).worked,0);
}
function totalWorkedFor(uid){
  return userRecs(uid).reduce((a,r)=>a+calc(r).worked,0);
}
function saldoOverviewModal(){
 let month=currentMonth();
 let rows=users.filter(u=>!isAdminUser(u)).map(u=>{
   let m=monthSaldoFor(u.id,month);
   let t=totalSaldo(u.id);
   let mw=monthWorkedFor(u.id,month);
   let tw=totalWorkedFor(u.id);
   return `<tr><td>${u.naam}</td><td>${dur(mw)}</td><td class="${m>=0?'plus':'minus'}">${sal(m)}</td><td>${dur(tw)}</td><td class="${t>=0?'plus':'minus'}">${sal(t)}</td></tr>`;
 }).join('');
 let totalMonth=users.filter(u=>!isAdminUser(u)).reduce((a,u)=>a+monthSaldoFor(u.id,month),0);
 let totalAll=users.filter(u=>!isAdminUser(u)).reduce((a,u)=>a+totalSaldo(u.id),0);
 openModal('Maand / totaal saldo',`
  <div class="saldoCards">
   <div class="mini"><span>Maand</span><b>${month}</b></div>
   <div class="mini"><span>Saldo deze maand</span><b class="${totalMonth>=0?'plus':'minus'}">${sal(totalMonth)}</b></div>
   <div class="mini"><span>Totaal saldo</span><b class="${totalAll>=0?'plus':'minus'}">${sal(totalAll)}</b></div>
  </div>
  <table class="table"><tr><th>Werknemer</th><th>Gewerkt deze maand</th><th>Saldo deze maand</th><th>Totaal gewerkt</th><th>Totaal saldo</th></tr>${rows}</table>
  <p class="warn">Saldo deze maand = verschil tegenover standaard werkdag binnen deze maand. Totaal saldo bevat ook het beginsaldo.</p>`);
}

  </div>

 $('liveSql').value=liveSqlText();

async function resetHubItems(){
 if(!confirm('Zeker? Dit wist teamchat, mededelingen en activiteitenlog.'))return;
 try{
   await sb('/hub_items?type=in.(chat,announcement,audit)',{method:'DELETE',headers:{Prefer:'return=representation'}});
   hubItems=[];
   await load();
   let check=await sb('/hub_items?select=id&limit=1');
   if(check.length){
     msg('Reset niet volledig gelukt. Gebruik de SQL in Supabase: delete from hub_items;');
     actionBanner('⚠️ RESET NIET VOLLEDIG','Er staan nog items in hub_items','warn','Gebruik de SQL als backup.');
   }else{
     actionBanner('✅ TESTDATA GEWIST','Chat, mededelingen en activiteitenlog zijn leeg','ok','Charlie heeft opgeruimd.');
   }
   liveStartModal();
 }catch(e){
   msg('Resetfout: '+err(e)+' Gebruik anders de SQL: delete from hub_items;');
 }
}
async function resetOldRecords(){
 let d=$('resetStartDate').value||today();
 if(!confirm('Zeker? Dit wist alle registraties vóór '+d+'.'))return;
 try{
   await sb('/urenregistratie?datum=lt.'+d,{method:'DELETE',headers:{Prefer:'return=representation'}});
   await load();
   actionBanner('✅ TESTREGISTRATIES GEWIST','Alles vóór '+d+' is verwijderd','ok','Charlie heeft de start klaargezet.');
   liveStartModal();
 }catch(e){
   msg('Resetfout registraties: '+err(e));
 }
}
async function resetAllRecords(){
 if(!confirm('LAATSTE CONTROLE: alle urenregistraties wissen? Werknemers blijven bestaan.'))return;
 if(!confirm('Ben je 100% zeker? Dit kan niet via de app ongedaan gemaakt worden.'))return;
 try{
   await sb('/urenregistratie?id=gte.0',{method:'DELETE',headers:{Prefer:'return=representation'}});
   records=[];
   await load();
   let check=await sb('/urenregistratie?select=id&limit=1');
   if(check.length){
     msg('Reset niet volledig gelukt. Gebruik de SQL in Supabase: delete from urenregistratie;');
     actionBanner('⚠️ RESET NIET VOLLEDIG','Er staan nog registraties in Supabase','warn','Gebruik de SQL als backup.');
   }else{
     actionBanner('✅ ALLE REGISTRATIES GEWIST','Klaar voor officiële start','ok','Charlie begint met een propere lei.');
   }
   liveStartModal();
 }catch(e){
   msg('Resetfout registraties: '+err(e));
 }
}
