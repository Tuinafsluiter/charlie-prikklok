 <div id="workView" class="hidden"><div class="workHead"><div><p class="subtitle">Welkom</p><h1 class="title" id="hello">Jos</h1><span class="role hidden" id="roleBadge">Beheerder</span></div><button class="logout" id="logoutBtn">↪ Uitloggen</button></div><div id="employeePanel"><div class="actions"><button class="action" data-action="in"><span class="ico">↪</span><span><h3>Inchecken</h3><p>Start uw werkdag</p></span></button><button class="action" data-action="breakStart"><span class="ico">☕</span><span><h3>Schoft starten</h3><p>Begin uw pauze</p></span></button><button class="action" data-action="breakStop"><span class="ico">▶</span><span><h3>Schoft stoppen</h3><p>Einde van uw pauze</p></span></button><button class="action red" data-action="out"><span class="ico">↩</span><span><h3>Uitchecken</h3><p>Einde werkdag</p></span></button></div><div class="statusGrid" id="statusGrid"></div></div><div id="adminPanel" class="adminCards hidden"><div class="adminStats" id="adminStats"></div><div class="overview"><h3>Teamoverzicht Vandaag</h3><div id="adminToday"></div></div><div class="adminBtns"><button class="tile" id="plusBtn">📊 Plusuren</button><button class="tile" id="recupBtn">📅 Recupdagen</button><button class="tile" id="verlofBtn">🌴 Verlof</button><button class="tile" id="ziekteBtn">♡ Ziekte</button><button class="tile" id="workersBtn">👥 Werknemers</button><button class="tile" id="registrationsBtn">👷 Registraties</button><button class="tile" id="settingsBtn">⚙️ Instellingen</button><button class="tile" id="exportBtn">📄 Excel export</button></div></div></div>

<script>
const SUPABASE_URL='https://uwtkopnjwewkodozvkxi.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_-YUPSJu3IeIID2mS1rhgIA_nngfTjWA';
const API=SUPABASE_URL+'/rest/v1';
const HEADERS={apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json'};
const NORM=480;let pin='',current=null,users=[],records=[],activeEntry=null;
const $=id=>document.getElementById(id);
const CHARLIE_QUOTES={
  open:[
    'Charlie waakt over uw uren',
    'Charlie staat paraat. Jij ook?',
    'Nieuwe werkdag, nieuwe kansen.',
    'Charlie bewaakt ondertussen het team.',
    'Elke minuut telt. Charlie noteert mee.',
    'Goed begonnen is half gewerkt.',
    'Tuinafsluitingen zonder gedoe, uren zonder discussie.'
  ],
  monday:['Nieuwe week. Charlie is er klaar voor.','Maandagmodus aan. Charlie houdt toezicht.'],
  friday:['Het weekend is dichterbij dan maandag.','Nog even doorbijten. De zetel roept al.','Vrijdaggevoel gespot. Charlie houdt de klok in het oog.'],
  login:['Charlie heeft u herkend.','Welkom terug. Charlie is alert.','De werkdag kan beginnen.'],
  in:['Ingecheckt. Charlie noteert het.','Werkdag gestart. Veel succes!','Charlie ziet dat ge eraan begint.'],
  breakStart:['Schoft gestart. Even opladen.','Charlie bewaakt ondertussen de uren.','Pauze verdiend. Koffie mag.'],
  breakStop:['Schoft voorbij. Terug in actie.','Charlie heeft de pauze genoteerd.','We zijn weer vertrokken.'],
  out:['Goed gewerkt. Tijd voor de zetel.','Werkdag afgesloten. Charlie neemt de wacht over.','De uren zijn veilig opgeborgen.'],
  longDay:['Sterke werkdag. Charlie geeft een pootje. 🐾','Meer dan 9 uur gewerkt. Charlie is onder de indruk.','Plusuren gespaard. Charlie noteert het.']
};
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function setCharlieQuote(type='open',extra=null){let d=new Date(),arr=[...(CHARLIE_QUOTES[type]||CHARLIE_QUOTES.open)];if(type==='open'&&users?.length){let count=users.filter(u=>!isAdminUser(u)).length;if(count)arr.unshift(`Charlie bewaakt ondertussen ${count} medewerker${count===1?'':'s'}.`)}if(type==='open'&&d.getDay()===5)arr=[...CHARLIE_QUOTES.friday,...arr];if(type==='open'&&d.getDay()===1)arr=[...CHARLIE_QUOTES.monday,...arr];if(extra)arr.unshift(extra);let el=$('charlieQuote');if(el)el.textContent=pick(arr)}

function tick(){let d=new Date();$('time').textContent=d.toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'});$('date').textContent=d.toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}setInterval(tick,1000);tick();
function today(){return new Date().toISOString().slice(0,10)}function iso(){return new Date().toISOString()}function mins(a,b){return Math.round((new Date(b)-new Date(a))/60000)}
function dur(m){m=Math.round(Number(m)||0);let neg=m<0;m=Math.abs(m);return (neg?'-':'')+Math.floor(m/60)+'u'+String(m%60).padStart(2,'0')}function sal(m){m=Math.round(Number(m)||0);return (m>=0?'+':'-')+dur(Math.abs(m))}function hm(x){return x?new Date(x).toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'}):'--:--'}
async function sb(path,opts={}){let res=await fetch(API+path,{...opts,headers:{...HEADERS,...(opts.headers||{})}});if(!res.ok)throw new Error(await res.text());if(res.status===204)return null;return res.json()}
function msg(t){$('message').textContent=t;$('message').classList.remove('hidden');setTimeout(()=>$('message').classList.add('hidden'),5200)}function err(e){return String(e.message||e).slice(0,220)}
function drawDots(){[...$('dots').children].forEach((s,i)=>s.textContent=pin[i]?'•':'–')}function keypad(){['1','2','3','4','5','6','7','8','9','0','⌫'].forEach(n=>{let b=document.createElement('button');b.textContent=n;if(n==='0')b.className='wide';if(n==='⌫')b.className='del';b.onclick=()=>{if(n==='⌫')pin=pin.slice(0,-1);else if(pin.length<4)pin+=n;drawDots();if(pin.length===4)setTimeout(login,120)};$('keypad').appendChild(b)})}keypad();$('loginBtn').onclick=login;
async function load(){users=await sb('/werknemers?select=*&actief=eq.true&order=id.asc');records=await sb('/urenregistratie?select=*&order=datum.desc,inkloktijd.desc&limit=300');if(current)activeEntry=await getActive(current.id);render()}
async function getActive(uid){let r=await sb(`/urenregistratie?select=*&medewerker_id=eq.${uid}&datum=eq.${today()}&uitkloktijd=is.null&inkloktijd=not.is.null&order=inkloktijd.desc&limit=1`);return r[0]||null}
async function login(){try{let r=await sb('/werknemers?select=*&pincode=eq.'+encodeURIComponent(pin)+'&actief=eq.true&limit=1');if(!r[0]){msg('🐕 Charlie kent deze pincode niet.');pin='';drawDots();return}current=r[0];pin='';drawDots();$('loginView').classList.add('hidden');$('workView').classList.remove('hidden');$('hello').textContent=current.naam;let admin=isAdmin();$('roleBadge').classList.toggle('hidden',!admin);$('employeePanel').classList.toggle('hidden',admin);$('adminPanel').classList.toggle('hidden',!admin);await load();setCharlieQuote('login');msg('🐕 '+pick(CHARLIE_QUOTES.login)+' Welkom '+current.naam+'.')}catch(e){msg('Loginfout: '+err(e))}}
function isAdmin(){let r=String(current?.rol||'').toLowerCase();return r.includes('admin')||r.includes('beheer')||current?.naam?.toLowerCase()==='jos'}
function calc(r){let w=Number(r.totaal_minuten||0);if(Number(r.pauze_minuten)===9999)return{worked:0,pause:0,balance:w,type:'Beginsaldo'};if(!w&&r.inkloktijd&&r.uitkloktijd)w=Math.max(0,mins(r.inkloktijd,r.uitkloktijd)-Number(r.pauze_minuten||0));let type='Werkdag';if(!r.inkloktijd&&w<0)type=w<=-480?'Recupdag':'Halve recup';if(!r.inkloktijd&&w===480)type='Verlof';if(!r.inkloktijd&&w===0&&r.uitkloktijd)type='Ziekte';return{worked:w,pause:Number(r.pauze_minuten||0),balance:w? w-NORM:0,type}}
function userRecs(uid){return records.filter(r=>Number(r.medewerker_id)===Number(uid))}function monthSaldo(uid){return userRecs(uid).filter(r=>String(r.datum||'').startsWith(today().slice(0,7))&&(r.uitkloktijd||r.totaal_minuten!==null)).reduce((s,r)=>s+calc(r).balance,0)}function totalSaldo(uid){return userRecs(uid).filter(r=>r.uitkloktijd||r.totaal_minuten!==null).reduce((s,r)=>s+calc(r).balance,0)}function weekStart(){let d=new Date();let day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toISOString().slice(0,10)}function weekSaldo(uid){let ws=weekStart();return userRecs(uid).filter(r=>String(r.datum||'')>=ws&&(r.uitkloktijd||r.totaal_minuten!==null)).reduce((s,r)=>s+calc(r).balance,0)}function dayWork(uid){let rs=userRecs(uid).filter(r=>r.datum===today());return rs.reduce((s,r)=>s+calc(r).worked,0)}function recupDays(m){let pos=Math.max(0,Number(m)||0);let whole=Math.floor(pos/480),half=Math.floor((pos-whole*480)/240);return whole+(half?0.5:0)}
function render(){if(!current)return;if(isAdmin())renderAdminHome();else renderEmployee()}
function renderEmployee(){let r=activeEntry||userRecs(current.id).find(x=>x.datum===today());let ps=r?localStorage.getItem('pause_'+r.id):null;let c=r?calc(r):null;$('statusGrid').innerHTML=r?`<div class="mini"><span>Ingecheckt</span><b>${hm(r.inkloktijd)}</b></div><div class="mini"><span>Schoft</span><b>${dur(c.pause)}${ps?' loopt':''}</b></div><div class="mini"><span>Uitchecken</span><b>${hm(r.uitkloktijd)}</b></div><div class="mini"><span>Vandaag</span><b>${dur(c.worked)}</b></div>`:`<div class="mini"><span>Status</span><b>Nog niet gestart</b></div><div class="mini"><span>Vandaag</span><b>0u00</b></div>`}
function renderAdminHome(){
 let list=users.filter(u=>!isAdminUser(u));
 let todayRows=records.filter(r=>r.datum===today());
 let active=todayRows.filter(r=>r.inkloktijd&&!r.uitkloktijd).length;
 let checked=todayRows.filter(r=>r.inkloktijd&&r.uitkloktijd).length;
 let verlof=todayRows.filter(r=>calc(r).type==='Verlof').length;
 let ziek=todayRows.filter(r=>calc(r).type==='Ziekte').length;
 let worked=todayRows.reduce((s,r)=>s+calc(r).worked,0);
 if($('adminStats'))$('adminStats').innerHTML=`<div class="mini"><span>Actief</span><b>${active}</b></div><div class="mini"><span>Uitgecheckt</span><b>${checked}</b></div><div class="mini"><span>Verlof / ziek</span><b>${verlof}/${ziek}</b></div><div class="mini"><span>Vandaag gewerkt</span><b>${dur(worked)}</b></div>`;
 $('adminToday').innerHTML=list.map(u=>{let open=userRecs(u.id).find(r=>r.datum===today()&&!r.uitkloktijd&&r.inkloktijd);let special=userRecs(u.id).find(r=>r.datum===today()&&!r.inkloktijd&&r.totaal_minuten!==null);let status=open?'Aan het werk':special?calc(special).type:'Vandaag';let w=dayWork(u.id);let s=monthSaldo(u.id);return `<div class="emp"><div class="avatar">${u.naam[0]}</div><div><b>${u.naam}</b><small>${status}</small><small>Saldo maand</small></div><div><b>${dur(w)}</b><small class="${s>=0?'plus':'minus'}">${sal(s)}</small></div></div>`}).join('')||'<div class="emp">Geen werknemers gevonden</div>'}
async function action(a){try{let r=await getActive(current.id);if(a==='in'){if(r)return msg('Je bent al ingecheckt.');await sb('/urenregistratie',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify({medewerker_id:current.id,datum:today(),inkloktijd:iso(),pauze_minuten:0})});setCharlieQuote('in');msg('🐕 '+pick(CHARLIE_QUOTES.in))}
if(a==='breakStart'){if(!r)return msg('Eerst inchecken.');localStorage.setItem('pause_'+r.id,iso());setCharlieQuote('breakStart');msg('☕ '+pick(CHARLIE_QUOTES.breakStart))}
if(a==='breakStop'){if(!r)return msg('Geen actieve werkdag.');let ps=localStorage.getItem('pause_'+r.id);if(!ps)return msg('Geen actieve schoft gevonden.');let add=Math.max(0,mins(ps,iso()));await sb('/urenregistratie?id=eq.'+r.id,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify({pauze_minuten:Number(r.pauze_minuten||0)+add})});localStorage.removeItem('pause_'+r.id);setCharlieQuote('breakStop');msg('☕ '+pick(CHARLIE_QUOTES.breakStop)+' ('+dur(add)+')')}
if(a==='out'){if(!r)return msg('Je bent nog niet ingecheckt.');let ps=localStorage.getItem('pause_'+r.id),pause=Number(r.pauze_minuten||0);if(ps){pause+=Math.max(0,mins(ps,iso()));localStorage.removeItem('pause_'+r.id)}let out=iso(),worked=Math.max(0,mins(r.inkloktijd,out)-pause);await sb('/urenregistratie?id=eq.'+r.id,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify({uitkloktijd:out,pauze_minuten:pause,totaal_minuten:worked})});setCharlieQuote(worked>=540?'longDay':'out');msg('🐕 '+pick(worked>=540?CHARLIE_QUOTES.longDay:CHARLIE_QUOTES.out)+' Netto: '+dur(worked))}await load()}catch(e){msg('Databasefout: '+err(e))}}
document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>action(b.dataset.action));$('logoutBtn').onclick=()=>{current=null;activeEntry=null;$('workView').classList.add('hidden');$('loginView').classList.remove('hidden');msg('Uitgelogd.')};
function openModal(title,html){$('modalTitle').textContent=title;$('modalContent').innerHTML=html;$('adminModal').classList.add('show')} $('closeModal').onclick=()=>$('adminModal').classList.remove('show');
$('plusBtn').onclick=()=>{let rows=users.filter(u=>!isAdminUser(u)).map(u=>{let m=monthSaldo(u.id),w=weekSaldo(u.id),t=totalSaldo(u.id);return `<tr><td>${u.naam}</td><td>${dur(dayWork(u.id))}</td><td class="${w>=0?'plus':'minus'}">${sal(w)}</td><td class="${m>=0?'plus':'minus'}">${sal(m)}</td><td class="${t>=0?'plus':'minus'}">${sal(t)}</td><td>${recupDays(t)} dag(en)</td></tr>`}).join('');openModal('Plusuren',`<table class="table"><tr><th>Werknemer</th><th>Vandaag</th><th>Deze week</th><th>Deze maand</th><th>Totaal saldo</th><th>Recup mogelijk</th></tr>${rows}</table><p class="warn">Regel: 8u00 per werkdag is nul. Meer is plus, minder is min. Recup mogelijk wordt berekend op het totale positieve saldo.</p>`)};
function specialForm(type){let options=users.filter(u=>!isAdminUser(u)).map(u=>`<option value="${u.id}">${u.naam}</option>`).join('');let map={recup:'Recupdag',verlof:'Verlof',ziekte:'Ziekte'};let rangeFields=type==='recup'?`<input id="mDate" type="date" value="${today()}"><select id="mAmount"><option value="-480">Volledige recupdag (-8u)</option><option value="-240">Halve recup (-4u)</option></select>`:`<label>Van</label><input id="mStart" type="date" value="${today()}"><label>Tot en met</label><input id="mEnd" type="date" value="${today()}"><label class="check"><input id="mSkipWeekend" type="checkbox" checked> Weekends overslaan</label>`;openModal(map[type],`<div class="two"><div><div class="form"><select id="mUser">${options}</select>${rangeFields}<textarea id="mNote" rows="2" placeholder="Opmerking (optioneel)"></textarea><button class="btn green" id="mSave">Opslaan</button></div><p class="warn">${type==='recup'?'Recup wordt van de plusuren afgetrokken.':'Meerdere dagen worden automatisch als aparte dagregels opgeslagen.'}</p></div><div><h3>Charlie zegt</h3><div class="warn">🐕 ${type==='verlof'?'Verlof ingepland. Charlie neemt even over.':type==='ziekte'?'Rust goed uit. Charlie bewaakt de uren.':'Recupdag toegevoegd. Geniet ervan.'}</div></div></div>`);$('mSave').onclick=()=>saveSpecial(type)}
function isAdminUser(u){let r=String(u.rol||'').toLowerCase();return r.includes('admin')||r.includes('beheer')||u.naam.toLowerCase()==='jos'}
$('recupBtn').onclick=()=>specialForm('recup');$('verlofBtn').onclick=()=>specialForm('verlof');$('ziekteBtn').onclick=()=>specialForm('ziekte');
$('workersBtn').onclick=()=>workersModal();
if($('registrationsBtn'))$('registrationsBtn').onclick=()=>registrationsModal();

if($('settingsBtn'))$('settingsBtn').onclick=()=>settingsModal();
function settingsModal(){let rows=users.filter(u=>!isAdminUser(u)).map(u=>{let start=userRecs(u.id).filter(r=>Number(r.pauze_minuten)===9999).reduce((s,r)=>s+Number(r.totaal_minuten||0),0);return `<tr><td>${u.naam}</td><td>${sal(start)}</td><td><button class="btn light" onclick="editStartSaldo(${u.id})">Wijzig</button></td></tr>`}).join('');openModal('Instellingen',`<div class="two"><div><h3>Basisinstellingen</h3><table class="table"><tr><th>Instelling</th><th>Waarde</th></tr><tr><td>Standaard werkdag</td><td>8u00</td></tr><tr><td>Volledige recupdag</td><td>-8u00</td></tr><tr><td>Halve recupdag</td><td>-4u00</td></tr><tr><td>Quotes</td><td>Charlie quotes actief</td></tr><tr><td>Versie</td><td>Charlie Prikklok v1.1</td></tr></table><h3>Beginsaldo plus/minuren</h3><table class="table"><tr><th>Werknemer</th><th>Beginsaldo</th><th></th></tr>${rows}</table><p class="warn">Vul hier de bestaande plus- of minuren in. Charlie rekent daarna verder vanaf dit saldo.</p></div><div><h3>App status</h3><div class="warn">✅ Prikklok actief<br>✅ Supabase gekoppeld<br>✅ Plusuren actief<br>✅ Excel-export actief<br>✅ Registraties beheren actief<br>✅ Mobiele weergave verbeterd</div></div></div>`)}
function editStartSaldo(uid){let u=users.find(x=>Number(x.id)===Number(uid));let start=userRecs(uid).filter(r=>Number(r.pauze_minuten)===9999).reduce((s,r)=>s+Number(r.totaal_minuten||0),0);openModal('Beginsaldo '+(u?.naam||''),`<div class="form"><label>Plus/minuren in minuten</label><input id="startSaldoMin" type="number" value="${start}"><p class="warn">Voorbeelden: +2u30 = 150, -3u15 = -195, +8u00 = 480.</p><button class="btn green" id="saveStartSaldoBtn">Opslaan</button><button class="btn light" id="backSettingsBtn">Terug</button></div>`);$('saveStartSaldoBtn').onclick=()=>saveStartSaldo(uid);$('backSettingsBtn').onclick=settingsModal}
async function saveStartSaldo(uid){try{let val=Number($('startSaldoMin').value||0);let existing=userRecs(uid).filter(r=>Number(r.pauze_minuten)===9999);for(let r of existing){await sb('/urenregistratie?id=eq.'+r.id,{method:'DELETE'})}if(val!==0){await sb('/urenregistratie',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify({medewerker_id:uid,datum:'2026-01-01',pauze_minuten:9999,totaal_minuten:val,uitkloktijd:iso()})})}msg('Beginsaldo opgeslagen.');await load();settingsModal()}catch(e){msg('Opslagfout: '+err(e))}}
function workersModal(){let rows=users.map(u=>`<tr><td>${u.naam}</td><td>${u.pincode||''}</td><td>${u.rol||''}</td><td>${u.actief?'Actief':'Inactief'}</td><td><button class="btn light" onclick="editWorker(${u.id})">Wijzig</button></td></tr>`).join('');openModal('Werknemers beheren',`<div class="two"><div><h3>Bestaande werknemers</h3><table class="table"><tr><th>Naam</th><th>Pincode</th><th>Rol</th><th>Status</th><th></th></tr>${rows}</table></div><div><h3>Nieuwe werknemer</h3><div class="form"><input id="newName" placeholder="Naam"><input id="newPin" placeholder="Pincode, bv. 1234" maxlength="4"><select id="newRole"><option value="chauffeur">chauffeur</option><option value="magazijnier">magazijnier</option><option value="admin">admin</option></select><button class="btn green" id="addWorkerBtn">Toevoegen</button></div><p class="warn">Pincode moet uniek zijn. Zet werknemers liever op inactief dan te verwijderen.</p></div></div>`);$('addWorkerBtn').onclick=addWorker}
async function addWorker(){try{let naam=$('newName').value.trim(),pincode=$('newPin').value.trim(),rol=$('newRole').value;if(!naam||!pincode)return msg('Naam en pincode zijn verplicht.');await sb('/werknemers',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify({naam,pincode,rol,actief:true})});msg('Werknemer toegevoegd.');await load();workersModal()}catch(e){msg('Opslagfout: '+err(e))}}
function editWorker(id){let u=users.find(x=>Number(x.id)===Number(id));if(!u)return;openModal('Werknemer wijzigen',`<div class="form"><label>Naam</label><input id="editName" value="${u.naam||''}"><label>Pincode</label><input id="editPin" value="${u.pincode||''}" maxlength="4"><label>Rol</label><select id="editRole"><option ${u.rol==='chauffeur'?'selected':''} value="chauffeur">chauffeur</option><option ${u.rol==='magazijnier'?'selected':''} value="magazijnier">magazijnier</option><option ${u.rol==='admin'?'selected':''} value="admin">admin</option></select><label>Status</label><select id="editActive"><option value="true" ${u.actief?'selected':''}>Actief</option><option value="false" ${!u.actief?'selected':''}>Inactief</option></select><button class="btn green" id="saveWorkerBtn">Opslaan</button><button class="btn light" id="backWorkersBtn">Terug naar lijst</button></div>`);$('saveWorkerBtn').onclick=()=>saveWorker(id);$('backWorkersBtn').onclick=workersModal}
async function saveWorker(id){try{let body={naam:$('editName').value.trim(),pincode:$('editPin').value.trim(),rol:$('editRole').value,actief:$('editActive').value==='true'};if(!body.naam||!body.pincode)return msg('Naam en pincode zijn verplicht.');await sb('/werknemers?id=eq.'+id,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify(body)});msg('Werknemer opgeslagen.');await load();workersModal()}catch(e){msg('Opslagfout: '+err(e))}}


function registrationsModal(){
 let options='<option value="all">Alle werknemers</option>'+users.filter(u=>!isAdminUser(u)).map(u=>`<option value="${u.id}">${u.naam}</option>`).join('');
 openModal('Registraties beheren',`<div class="form"><div class="two"><div><label>Werknemer</label><select id="regUser">${options}</select></div><div><label>Vanaf datum</label><input id="regFrom" type="date" value="${today().slice(0,8)}01"></div></div><button class="btn green" id="regFilterBtn">Filter toepassen</button></div><div id="regList"></div><p class="warn">Gebruik dit voor vergeten uitklokken, verkeerde pauzes of testregistraties. Wijzigingen tellen meteen mee in plusuren en export.</p>`);
 $('regFilterBtn').onclick=renderRegistrationsList; renderRegistrationsList();
}
function renderRegistrationsList(){
 let uid=$('regUser')?.value||'all', from=$('regFrom')?.value||'1900-01-01';
 let userById=Object.fromEntries(users.map(u=>[Number(u.id),u.naam]));
 let list=records.filter(r=>(uid==='all'||Number(r.medewerker_id)===Number(uid))&&String(r.datum||'')>=from).sort((a,b)=>String(b.datum||'').localeCompare(String(a.datum||'')) || String(b.inkloktijd||'').localeCompare(String(a.inkloktijd||''))).slice(0,80);
 $('regList').innerHTML=`<table class="table"><tr><th>Datum</th><th>Werknemer</th><th>Type</th><th>In</th><th>Uit</th><th>Schoft</th><th>Gewerkt</th><th>Saldo</th><th>Acties</th></tr>${list.map(r=>{let c=calc(r);return `<tr><td>${r.datum||''}</td><td>${userById[Number(r.medewerker_id)]||r.medewerker_id}</td><td>${c.type}</td><td>${hm(r.inkloktijd)}</td><td>${hm(r.uitkloktijd)}</td><td>${dur(c.pause)}</td><td>${dur(c.worked)}</td><td>${sal(c.balance)}</td><td><button class="btn light" onclick="editRegistration(${r.id})">✏️</button> <button class="btn light" onclick="deleteRegistration(${r.id})">🗑️</button></td></tr>`}).join('')}</table>`;
}
function timeVal(x){return x?new Date(x).toTimeString().slice(0,5):''}
function localIso(date,time){if(!date||!time)return null;return new Date(date+'T'+time+':00').toISOString()}
function editRegistration(id){
 let r=records.find(x=>Number(x.id)===Number(id)); if(!r)return msg('Registratie niet gevonden.');
 let opts=users.filter(u=>!isAdminUser(u)).map(u=>`<option value="${u.id}" ${Number(u.id)===Number(r.medewerker_id)?'selected':''}>${u.naam}</option>`).join('');
 let c=calc(r);
 openModal('Registratie aanpassen',`<div class="form"><label>Werknemer</label><select id="eUser">${opts}</select><label>Datum</label><input id="eDate" type="date" value="${r.datum||today()}"><div class="two"><div><label>Incheck</label><input id="eIn" type="time" value="${timeVal(r.inkloktijd)}"></div><div><label>Uitcheck</label><input id="eOut" type="time" value="${timeVal(r.uitkloktijd)}"></div></div><label>Schoft / pauze minuten</label><input id="ePause" type="number" min="0" value="${Number(r.pauze_minuten||0)}"><label>Manueel totaal minuten (voor verlof/ziekte/recup)</label><input id="eTotal" type="number" value="${r.inkloktijd?'':Number(r.totaal_minuten||0)}"><button class="btn green" id="saveRegBtn">Opslaan</button><button class="btn light" id="backRegBtn">Terug naar registraties</button></div><p class="warn">Voor gewone werkdagen vul je incheck, uitcheck en pauze in. Voor verlof/ziekte/recup kun je het manueel totaal gebruiken: verlof 480, ziekte 0, recup -480 of -240.</p>`);
 $('saveRegBtn').onclick=()=>saveRegistration(id); $('backRegBtn').onclick=registrationsModal;
}
async function saveRegistration(id){
 try{
  let date=$('eDate').value, tin=$('eIn').value, tout=$('eOut').value, pause=Number($('ePause').value||0), manual=$('eTotal').value;
  let inIso=localIso(date,tin), outIso=localIso(date,tout), total=null;
  if(inIso&&outIso) total=Math.max(0,mins(inIso,outIso)-pause); else if(manual!=='') total=Number(manual);
  let body={medewerker_id:Number($('eUser').value),datum:date,inkloktijd:inIso,uitkloktijd:outIso,pauze_minuten:pause,totaal_minuten:total};
  await sb('/urenregistratie?id=eq.'+id,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify(body)});
  msg('Registratie opgeslagen. Charlie heeft opnieuw gerekend.'); await load(); registrationsModal();
 }catch(e){msg('Opslagfout: '+err(e))}
}
async function deleteRegistration(id){
 if(!confirm('Deze registratie verwijderen?'))return;
 try{await sb('/urenregistratie?id=eq.'+id,{method:'DELETE'}); msg('Registratie verwijderd.'); await load(); registrationsModal()}catch(e){msg('Verwijderfout: '+err(e))}
}

function datesBetween(start,end,skipWeekend){let out=[],a=new Date(start+'T12:00:00'),b=new Date(end+'T12:00:00');if(isNaN(a)||isNaN(b)||a>b)return out;for(let d=new Date(a);d<=b;d.setDate(d.getDate()+1)){let day=d.getDay();if(skipWeekend&&(day===0||day===6))continue;out.push(d.toISOString().slice(0,10))}return out}
async function saveSpecial(type){try{let uid=Number($('mUser').value);let rows=[];if(type==='recup'){let date=$('mDate').value,val=Number($('mAmount').value);rows=[{medewerker_id:uid,datum:date,pauze_minuten:0,totaal_minuten:val,uitkloktijd:iso()}]}else{let ds=datesBetween($('mStart').value,$('mEnd').value,$('mSkipWeekend').checked);if(!ds.length)return msg('Geen geldige dagen gekozen.');let val=type==='verlof'?480:0;rows=ds.map(date=>({medewerker_id:uid,datum:date,pauze_minuten:0,totaal_minuten:val,uitkloktijd:iso()}))}await sb('/urenregistratie',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify(rows)});msg((type==='recup'?'Recup':type)+' opgeslagen: '+rows.length+' dag(en).');$('adminModal').classList.remove('show');await load()}catch(e){msg('Opslagfout: '+err(e))}}

function csvEscape(v){v=(v===null||v===undefined)?'':String(v);return '"'+v.replaceAll('"','""')+'"'}
function exportCsv(){try{if(!records.length){msg('Geen gegevens om te exporteren.');return}
 let userById=Object.fromEntries(users.map(u=>[Number(u.id),u.naam]));
 let rows=[['Datum','Werknemer','Type','Incheck','Uitcheck','Schoft','Gewerkt','Dagsaldo','Weeksaldo','Maandsaldo','Totaalsaldo','Recup mogelijk']];
 let sorted=records.slice().sort((a,b)=>String(a.datum||'').localeCompare(String(b.datum||'')) || String(a.inkloktijd||'').localeCompare(String(b.inkloktijd||'')));
 sorted.forEach(r=>{
  let c=calc(r), uid=Number(r.medewerker_id), naam=userById[uid]||('ID '+r.medewerker_id);
  rows.push([r.datum||'',naam,c.type||'Werkdag',hm(r.inkloktijd),hm(r.uitkloktijd),dur(c.pause),dur(c.worked),sal(c.balance),sal(weekSaldo(uid)),sal(monthSaldo(uid)),sal(totalSaldo(uid)),recupDays(totalSaldo(uid))+' dag(en)']);
 });
 let csv='\ufeff'+rows.map(row=>row.map(csvEscape).join(';')).join('\n');
 let blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
 let url=URL.createObjectURL(blob), a=document.createElement('a');
 a.href=url; a.download='tuinafsluiter-uren-'+today()+'.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
 msg('📄 Excel-export gemaakt. Charlie heeft alles netjes verpakt.');
}catch(e){msg('Exportfout: '+err(e))}}
if($('exportBtn'))$('exportBtn').onclick=exportCsv;

load().then(()=>setCharlieQuote('open')).catch(e=>msg('Supabase fout: '+err(e)));
</script></body></html>
