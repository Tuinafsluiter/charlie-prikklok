<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Tuinafsluiter Prikklok</title>
  <meta name="theme-color" content="#003f34" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{--green:#003f34;--green2:#006956;--lime:#87bd45;--soft:#eff7ec;--ink:#092820;--muted:#6d746f;--line:#e5ebe7;--white:#fff;--shadow:0 20px 50px rgba(0,45,36,.12);--radius:22px}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f7faf8;color:var(--ink)}
    button,input,select,textarea{font:inherit} button{cursor:pointer;border:0} .app{min-height:100dvh;display:flex;flex-direction:column;background:radial-gradient(circle at 20% 10%,#fff 0,#f8fbf9 40%,#edf5ef 100%)}
    header{height:132px;display:flex;align-items:center;justify-content:space-between;padding:28px 42px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.78);backdrop-filter:blur(16px);position:sticky;top:0;z-index:10}
    .brand{display:flex;gap:18px;align-items:center}.brand img{height:76px;max-width:430px}.clock{text-align:right}.time{font-size:48px;font-weight:850;letter-spacing:-2px}.date{font-size:16px;color:#1f2f2a}.online{display:flex;gap:10px;align-items:center;color:#087b5d;font-weight:800;margin-top:4px;justify-content:flex-end}.dot{width:10px;height:10px;background:#0aaa71;border-radius:50%;box-shadow:0 0 0 6px rgba(10,170,113,.12)}
    .main{flex:1;display:grid;grid-template-columns:330px minmax(520px,1fr) 320px;gap:28px;padding:34px 42px 24px;align-items:stretch}.charlie{position:relative;overflow:hidden;border-radius:var(--radius);min-height:620px;box-shadow:var(--shadow);background:#dce6dc}.charlie img{width:100%;height:100%;object-fit:cover;object-position:46% center;display:block;filter:saturate(1.02)}.charlie:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 35%,rgba(0,63,52,.78) 100%)}.badge{position:absolute;left:22px;bottom:26px;z-index:2;background:rgba(0,63,52,.94);color:white;border-radius:18px;padding:14px 18px;display:flex;gap:12px;align-items:center;font-weight:850;box-shadow:0 12px 30px rgba(0,0,0,.2)}.paw{font-size:30px;color:var(--lime)}
    .center{display:flex;flex-direction:column;gap:24px}.welcome{text-align:center;padding-top:10px}.welcome h1{font-size:40px;line-height:1;margin:0 0 8px}.welcome p{font-size:20px;color:var(--muted);margin:0}.pinbox{max-width:620px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;text-align:center}.pin-dots{display:flex;gap:12px;justify-content:center;margin:18px 0}.pin-dots span{width:60px;height:60px;border-radius:14px;background:#f4f7f5;border:1px solid #dfe7e2;display:grid;place-items:center;font-size:28px;font-weight:850}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:420px;margin:0 auto}.keypad button{height:62px;border-radius:14px;background:linear-gradient(145deg,#0b7a61,#003f34);color:white;font-size:26px;font-weight:850}.keypad .wide{grid-column:span 2}.ghost{background:#fff!important;color:var(--green)!important;border:1px solid var(--green)!important}.actions{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:24px}.action{min-height:164px;border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;background:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:10px;transition:.15s transform,.15s box-shadow}.action:hover{transform:translateY(-2px)}.action strong{font-size:24px}.action small{font-size:16px;color:var(--muted)}.action .ico{font-size:44px}.action.primary{background:linear-gradient(145deg,#0b6a55,#003f34);color:white}.action.lime{background:linear-gradient(145deg,#9ccc55,#6fa833);color:white}.action.pale{background:linear-gradient(145deg,#eef8df,#dff1c7);color:var(--green)}.action.disabled{opacity:.35;pointer-events:none}.msg{background:#fff;border-left:5px solid var(--lime);border-radius:16px;padding:14px 18px;box-shadow:0 10px 24px rgba(0,45,36,.08);font-weight:750}.side{display:flex;flex-direction:column;gap:24px}.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.card h3{margin:0;background:linear-gradient(145deg,#003f34,#005746);color:#fff;padding:16px 20px;font-size:16px;text-transform:uppercase;letter-spacing:.03em}.card .body{padding:22px}.saldo{text-align:center}.saldo .big{font-size:46px;font-weight:900;color:#5d9d36;letter-spacing:-1px}.saldo .lab{color:#5d9d36;font-weight:850;font-size:20px}.row{display:flex;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:1px solid #edf1ee}.row:last-child{border-bottom:0}.row b{color:#5d9d36}.pill{display:inline-flex;align-items:center;border-radius:999px;background:#e7f2dc;color:#5d8f2d;font-weight:800;padding:5px 12px}.nav{height:76px;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:center;gap:80px;align-items:center}.nav button{background:transparent;color:#1f2f2a;font-weight:850;font-size:18px}.nav button.active{color:#5d9d36}.footer{background:linear-gradient(145deg,#003f34,#002d25);color:white;display:flex;align-items:center;justify-content:space-between;padding:24px 42px}.footer img{height:54px;filter:brightness(0) invert(1)}.footer .charlie-text{font-size:20px;font-weight:800}.admin{display:none;position:fixed;inset:0;background:#f7faf8;z-index:30;overflow:auto;padding:28px}.admin.show{display:block}.admin-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:24px;max-width:1300px;margin:0 auto}.admin-head{max-width:1300px;margin:0 auto 24px;display:flex;justify-content:space-between;align-items:center}.table{width:100%;border-collapse:collapse;background:white;border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}.table th,.table td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left}.table th{background:#003f34;color:white}.form{display:grid;gap:12px}.form input,.form select,.form textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:white}.btn{border-radius:14px;background:#003f34;color:white;padding:12px 18px;font-weight:850}.btn.light{background:#e7f2dc;color:#003f34}.btn.danger{background:#b33333}.hidden{display:none!important}
    @media(max-width:1100px){header{height:auto;padding:20px;gap:18px}.brand img{height:58px}.main{grid-template-columns:1fr;padding:20px}.charlie{min-height:300px}.side{grid-row:auto}.nav{gap:28px;overflow:auto}.footer{padding:18px 22px}.footer img{display:none}.admin-grid{grid-template-columns:1fr}.time{font-size:36px}.actions{grid-template-columns:1fr 1fr}}
    @media(max-width:650px){.actions{grid-template-columns:1fr}.main{padding:12px}.brand img{height:46px}.clock{display:none}.welcome h1{font-size:30px}.charlie{min-height:250px}.nav{justify-content:flex-start;padding:0 14px}.footer{font-size:14px}.pin-dots span{width:48px;height:48px}}
  </style>
</head>
<body><div class="app">
<header><div class="brand"><img src="assets/logo.svg" alt="Tuinafsluiter"></div><div class="clock"><div class="time" id="time">--:--</div><div class="date" id="date">--</div><div class="online"><span class="dot"></span><span id="mode">Lokaal</span></div></div></header>
<main class="main">
<section class="charlie"><img src="assets/charlie.png" alt="Charlie"><div class="badge"><span class="paw">🐾</span><span>Charlie waakt<br>over de uren</span></div></section>
<section class="center">
  <div class="welcome"><h1 id="welcomeTitle">Welkom!</h1><p id="welcomeSub">Geef je pincode in om te starten</p></div>
  <div id="login" class="pinbox"><h2>Pincode</h2><div class="pin-dots" id="dots"><span>–</span><span>–</span><span>–</span><span>–</span></div><div class="keypad" id="keypad"></div></div>
  <div id="work" class="hidden"><div class="actions"><button class="action primary" data-action="in"><span class="ico">↪</span><strong>INCHECKEN</strong><small>Start je werkdag</small></button><button class="action lime" data-action="breakStart"><span class="ico">☕</span><strong>SCHOFT STARTEN</strong><small>Start je pauze</small></button><button class="action pale" data-action="breakStop"><span class="ico">☕</span><strong>SCHOFT STOPPEN</strong><small>Einde pauze</small></button><button class="action primary" data-action="out"><span class="ico">↩</span><strong>UITCHECKEN</strong><small>Einde werkdag</small></button></div></div>
  <div id="message" class="msg hidden"></div>
</section>
<aside class="side"><div class="card saldo"><h3>Jouw saldo</h3><div class="body"><div class="big" id="saldoBig">0u00</div><div class="lab" id="saldoLabel">saldo</div><div class="row"><span>Deze maand</span><b id="monthHours">0u00</b></div><div class="row"><span>Norm deze maand</span><span id="monthNorm">0u00</span></div></div></div><div class="card"><h3>Vandaag</h3><div class="body" id="todayBox"></div></div></aside>
</main><nav class="nav"><button class="active">⌂ Vandaag</button><button id="myHoursBtn">◷ Mijn uren</button><button id="adminBtn">⚙ Beheer</button><button id="logoutBtn">↪ Uitloggen</button></nav><footer class="footer"><img src="assets/logo.svg" alt=""><div class="charlie-text">Charlie waakt over de uren 🐾</div><button class="btn light" id="helpBtn">Hulp nodig?</button></footer></div>
<div class="admin" id="admin"><div class="admin-head"><h1>Beheer Tuinafsluiter Prikklok</h1><button class="btn light" id="closeAdmin">Terug naar prikklok</button></div><div class="admin-grid"><div class="card"><h3>Registraties</h3><div class="body"><button class="btn light" id="exportBtn">Download CSV / Excel</button><div style="height:14px"></div><table class="table" id="recordsTable"></table></div></div><div><div class="card"><h3>Recup / verlof / ziekte toevoegen</h3><div class="body"><div class="form"><select id="specialUser"></select><select id="specialType"><option value="recup_full">Recupdag (-8u)</option><option value="recup_half">Halve recup (-4u)</option><option value="verlof">Verlof</option><option value="ziekte">Ziekte</option></select><input id="specialDate" type="date"><textarea id="specialNote" placeholder="Opmerking"></textarea><button class="btn" id="addSpecial">Toevoegen</button></div></div></div><div style="height:24px"></div><div class="card"><h3>Werknemers</h3><div class="body"><table class="table" id="usersTable"></table></div></div></div></div></div>
<script>
// Charlie Prikklok v3.2 - gekoppeld aan Supabase
const SUPABASE_URL='https://uwtkopnjwewkodozvkxi.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_-YUPSJu3IeIID2mS1rhgIA_nngfTjWA';
const API=SUPABASE_URL+'/rest/v1';
const HEADERS={apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json'};
const NORM=8*60; let pin='', current=null, activeEntry=null, users=[], records=[];
const $=id=>document.getElementById(id);
function fmt(m){let neg=m<0;m=Math.abs(Math.round(m||0));return (neg?'-':'+')+Math.floor(m/60)+'u'+String(m%60).padStart(2,'0')}
function dur(m){m=Math.max(0,Math.round(m||0));return Math.floor(m/60)+'u'+String(m%60).padStart(2,'0')}
function nowISO(){return new Date().toISOString()} function today(){return new Date().toISOString().slice(0,10)}
function minsBetween(a,b){return Math.round((new Date(b)-new Date(a))/60000)} function hhmm(x){return x?new Date(x).toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'}):'--:--'}
async function sb(path,opts={}){const res=await fetch(API+path,{...opts,headers:{...HEADERS,...(opts.headers||{})}}); if(!res.ok){const t=await res.text();throw new Error(t||res.statusText)} if(res.status===204)return null; return res.json()}
function tick(){const d=new Date();$('time').textContent=d.toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'});$('date').textContent=d.toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} setInterval(tick,1000);tick();
async function loadUsers(){users=await sb('/werknemers?select=*&actief=eq.true&order=id.asc'); renderAdmin()}
async function loadRecords(){records=await sb('/urenregistratie?select=*&order=datum.desc,inkloktijd.desc&limit=250');}
async function login(){try{let found=await sb('/werknemers?select=*&pincode=eq.'+encodeURIComponent(pin)+'&actief=eq.true&limit=1');let u=found[0]; if(!u){msg('🐕 Charlie vertrouwt deze pincode niet helemaal...');pin='';drawDots();return} current=u; pin=''; $('login').classList.add('hidden');$('work').classList.remove('hidden');$('welcomeTitle').textContent='Welkom, '+u.naam+'!';$('welcomeSub').textContent='Wat wil je doen?'; $('mode').textContent='Online'; msg('🐕 Charlie zegt: welkom '+u.naam+'.'); await refresh()}catch(e){msg('Fout bij login: '+cleanErr(e));} }
function cleanErr(e){return String(e.message||e).slice(0,160)}
function msg(t){$('message').textContent=t;$('message').classList.remove('hidden');setTimeout(()=>$('message').classList.add('hidden'),5200)}
function drawDots(){[...$('dots').children].forEach((s,i)=>s.textContent=pin[i]?'•':'–')}
function renderKeypad(){let nums=['1','2','3','4','5','6','7','8','9','0','⌫'];$('keypad').innerHTML='';nums.forEach(n=>{let b=document.createElement('button');b.textContent=n;if(n==='0')b.className='wide';b.onclick=()=>{if(n==='⌫')pin=pin.slice(0,-1);else if(pin.length<4)pin+=n;drawDots();if(pin.length===4)setTimeout(login,100)};$('keypad').appendChild(b)})}
async function getActive(uid){let rows=await sb(`/urenregistratie?select=*&medewerker_id=eq.${uid}&datum=eq.${today()}&uitkloktijd=is.null&order=inkloktijd.desc&limit=1`);return rows[0]||null}
function rowCalc(r){let worked=Number(r.totaal_minuten||0); if(!worked&&r.inkloktijd&&r.uitkloktijd) worked=Math.max(0,minsBetween(r.inkloktijd,r.uitkloktijd)-Number(r.pauze_minuten||0)); return {br:Number(r.pauze_minuten||0),worked,saldo: worked?worked-NORM:0}}
async function refresh(){await loadUsers();await loadRecords(); if(current)activeEntry=await getActive(current.id); render()}
async function doAction(a){if(!current)return;try{let r=await getActive(current.id); if(a==='in'){if(r)return msg('🐕 Je bent al ingecheckt.');let rows=await sb('/urenregistratie',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify({medewerker_id:current.id,datum:today(),inkloktijd:nowISO(),pauze_minuten:0})});activeEntry=rows[0];msg('🐕 Werkdag gestart, veel succes!')}
 if(a==='breakStart'){if(!r)return msg('Eerst inchecken.');localStorage.setItem('pause_start_'+r.id,nowISO());msg('☕ Schoft gestart.')}
 if(a==='breakStop'){if(!r)return msg('Geen actieve werkdag.');let ps=localStorage.getItem('pause_start_'+r.id); if(!ps)return msg('Geen actieve schoft gevonden.');let add=Math.max(0,minsBetween(ps,nowISO()));let newPause=Number(r.pauze_minuten||0)+add;await sb('/urenregistratie?id=eq.'+r.id,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify({pauze_minuten:newPause})});localStorage.removeItem('pause_start_'+r.id);msg('🐕 Schoft gestopt: '+dur(add)+'.')}
 if(a==='out'){if(!r)return msg('Je bent nog niet ingecheckt.');let ps=localStorage.getItem('pause_start_'+r.id);let pauze=Number(r.pauze_minuten||0); if(ps){pauze+=Math.max(0,minsBetween(ps,nowISO()));localStorage.removeItem('pause_start_'+r.id)}let out=nowISO();let totaal=Math.max(0,minsBetween(r.inkloktijd,out)-pauze);await sb('/urenregistratie?id=eq.'+r.id,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify({uitkloktijd:out,pauze_minuten:pauze,totaal_minuten:totaal})});msg('🐕 Werkdag geregistreerd. Netto gewerkt: '+dur(totaal)+'.')}
 await refresh();}catch(e){msg('Databasefout: '+cleanErr(e));}}
function saldo(uid){return records.filter(r=>r.medewerker_id===uid&&r.uitkloktijd).reduce((s,r)=>s+rowCalc(r).saldo,0)}
function monthWorked(uid){let ym=today().slice(0,7);return records.filter(r=>r.medewerker_id===uid&&r.datum&&r.datum.startsWith(ym)&&r.uitkloktijd).reduce((s,r)=>s+rowCalc(r).worked,0)}
function render(){if(!current){$('todayBox').innerHTML='<div class="row"><span>Status</span><span class="pill">Wachten op pincode</span></div>';return} let s=saldo(current.id);$('saldoBig').textContent=fmt(s);$('saldoLabel').textContent=s>=0?'plusuren':'minuren';$('monthHours').textContent=dur(monthWorked(current.id));let works=records.filter(r=>r.medewerker_id===current.id&&r.datum&&r.datum.startsWith(today().slice(0,7))&&r.uitkloktijd).length;$('monthNorm').textContent=dur(works*NORM);let r=activeEntry || records.find(x=>x.medewerker_id===current.id&&x.datum===today()); let html=''; if(r){let c=rowCalc(r);let ps=localStorage.getItem('pause_start_'+r.id);html+=`<div class="row"><span>Ingecheckt</span><b>${hhmm(r.inkloktijd)}</b></div><div class="row"><span>Schoft</span><b>${dur(c.br)}${ps?' loopt':''}</b></div><div class="row"><span>Uitchecken</span><b>${hhmm(r.uitkloktijd)}</b></div><div class="row"><span>Netto gewerkt</span><b>${dur(c.worked)}</b></div><div class="row"><span>Dagstatus</span><span class="pill">${r.uitkloktijd?'Klaar':'Bezig'}</span></div><div class="row"><span>Doel</span><span>8u00</span></div>`} else html='<div class="row"><span>Status</span><span class="pill">Nog niet gestart</span></div>'; $('todayBox').innerHTML=html; renderAdmin()}
function renderAdmin(){if(!$('specialUser'))return;$('specialUser').innerHTML=users.filter(u=>u.actief).map(u=>`<option value="${u.id}">${u.naam}</option>`).join('');$('usersTable').innerHTML='<tr><th>Naam</th><th>Rol</th><th>Actief</th></tr>'+users.map(u=>`<tr><td>${u.naam}</td><td>${u.rol}</td><td>${u.actief?'ja':'nee'}</td></tr>`).join('');let rows=records.map(r=>{let u=users.find(x=>x.id===r.medewerker_id)||{};let c=rowCalc(r);return `<tr><td>${r.datum||''}</td><td>${u.naam||''}</td><td>Werkdag</td><td>${hhmm(r.inkloktijd)}</td><td>${hhmm(r.uitkloktijd)}</td><td>${dur(c.br)}</td><td>${dur(c.worked)}</td><td>${r.uitkloktijd?fmt(c.saldo):''}</td></tr>`}).join('');$('recordsTable').innerHTML='<tr><th>Datum</th><th>Naam</th><th>Type</th><th>In</th><th>Uit</th><th>Schoft</th><th>Werkuren</th><th>Saldo</th></tr>'+rows}
function logout(){current=null;activeEntry=null;$('login').classList.remove('hidden');$('work').classList.add('hidden');$('welcomeTitle').textContent='Welkom!';$('welcomeSub').textContent='Geef je pincode in om te starten';render()}
document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>doAction(b.dataset.action));$('logoutBtn').onclick=logout;$('adminBtn').onclick=()=>{if(current&&String(current.rol).toLowerCase().includes('beheer')){$('admin').classList.add('show');renderAdmin()}else msg('Alleen Jos kan naar beheer.')};$('closeAdmin').onclick=()=>$('admin').classList.remove('show');$('addSpecial').onclick=()=>msg('Recup/verlof/ziekte komt in de volgende stap in Supabase.');$('exportBtn').onclick=()=>{let csv='datum,naam,in,uit,schoft,werkuren,saldo\n'+records.map(r=>{let u=users.find(x=>x.id===r.medewerker_id)||{};let c=rowCalc(r);return [r.datum,u.naam||'',hhmm(r.inkloktijd),hhmm(r.uitkloktijd),dur(c.br),dur(c.worked),r.uitkloktijd?fmt(c.saldo):''].join(',')}).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='tuinafsluiter-prikklok.csv';a.click()};$('helpBtn').onclick=()=>msg('🐕 Charlie waakt over de uren. Bel Jos bij problemen.');$('myHoursBtn').onclick=()=>msg('Je saldo staat rechts in beeld.');renderKeypad();loadUsers().then(render).catch(e=>msg('Supabase fout: '+cleanErr(e)));
</script></script></body></html>
